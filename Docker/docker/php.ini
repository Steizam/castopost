; CastoPOST PHP settings

; Upload limits - must be >= client_max_body_size in Nginx
upload_max_filesize = 512M
post_max_size       = 520M

; Execution time - allow for FFmpeg conversion + upload
max_execution_time  = 600
max_input_time      = 600

; Memory
memory_limit = 256M

; Sessions
session.gc_maxlifetime = 28800
session.cookie_httponly = 1
session.cookie_samesite = "Lax"

; Hide PHP version
expose_php = Off

; Timezone (override via APP_TIMEZONE env var in entrypoint)
; date.timezone = UTC
