# docker/proxy.conf
# Nginx reverse proxy to put CastoPOST behind HTTPS
# Used with docker-compose.proxy.yml
#
# Replace YOUR_DOMAIN with your actual domain.
# SSL certificates managed by Let's Encrypt (certbot).

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://YOUR_DOMAIN$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 5m;

    # Must match or exceed the app's MAX_AUDIO_SIZE
    client_max_body_size 520M;

    # Security headers
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://castopost:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Match upload/conversion timeouts
        proxy_read_timeout    600;
        proxy_send_timeout    600;
        proxy_connect_timeout 60;

        # Buffer settings for large audio uploads
        proxy_request_buffering   off;
        proxy_buffering           off;
    }
}
