server {
    listen 8080;
    server_name _;

    root  /var/www/html;
    index index.php index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "no-referrer" always;

    # Block direct access to sensitive PHP files
    location ~ ^/(config|auth|castopod|drafts_store|templates_store|podcasts_store)\.php$ {
        deny all;
        return 404;
    }

    # Block direct access to JSON data files
    location ~ /.*\.json$ {
        deny all;
        return 404;
    }

    # Block tmp directory
    location ^~ /tmp/ {
        deny all;
        return 404;
    }

    # Block docker config directory
    location ^~ /docker/ {
        deny all;
        return 404;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # PHP files
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass  127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;

        # Extended timeouts for audio upload and FFmpeg conversion
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
    }

    # Application routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;
}
